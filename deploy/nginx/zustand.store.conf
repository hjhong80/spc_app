server {
    listen 80;
    listen [::]:80;
    server_name www.zustand.store zustand.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://zustand.store$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.zustand.store;

    ssl_certificate /home/ghdgowns/certbot/conf/live/zustand.store/fullchain.pem;
    ssl_certificate_key /home/ghdgowns/certbot/conf/live/zustand.store/privkey.pem;

    location / {
        return 301 https://zustand.store$request_uri;
    }
}

# Main site
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name zustand.store;

    ssl_certificate /home/ghdgowns/certbot/conf/live/zustand.store/fullchain.pem;
    ssl_certificate_key /home/ghdgowns/certbot/conf/live/zustand.store/privkey.pem;

    root /var/www/html;
    index index.html;

    location = /15min {
        return 301 /15min/;
    }

    location /15min/api/ {
        proxy_pass http://127.0.0.1:18081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /15min/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /spc {
        return 301 /spc/;
    }

    location /spc/api/ {
        proxy_pass http://127.0.0.1:8080/spc/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /spc/ {
        alias /opt/spc/frontend/;
        try_files $uri $uri/ /opt/spc/frontend/index.html;
    }

    location = / {
        root /var/www/html;
        index index.html;
    }
}
