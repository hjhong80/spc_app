spring.application.name=spc_back
server.port=8080
spring.main.banner-mode=off
spring.main.log-startup-info=false

spring.datasource.url=jdbc:mysql://localhost:3306/spc_db
spring.datasource.username=root
spring.datasource.password=test-only-password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.max-lifetime=30000
logging.level.com.spc.spc_back=INFO
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.boot.actuate.endpoint.web=WARN
logging.level.org.springframework.test.context=WARN
logging.level.org.springframework.boot.test.context=WARN
logging.level.org.testcontainers=WARN
logging.level.com.github.dockerjava=WARN
spc.upload.preview-row-limit=12
spc.upload.streaming-batch-size=300
spring.thymeleaf.check-template-location=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

mybatis.mapper-locations=classpath:mapper/*.xml

