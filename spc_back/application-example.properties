spring.application.name=spc_back
server.port=${SPC_SERVER_PORT:8080}
server.servlet.context-path=${SPC_SERVER_CONTEXT_PATH:/spc/api}
server.forward-headers-strategy=framework
springdoc.api-docs.enabled=${SPC_SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPC_SPRINGDOC_SWAGGER_UI_ENABLED:true}
spring.main.banner-mode=off
spring.main.log-startup-info=false
# Support both repository-root runs and VS Code dashboard runs from spc_back
spring.config.import=optional:file:./spc.env[.properties],optional:file:../spc.env[.properties],optional:file:./deploy/spc.env[.properties],optional:file:../deploy/spc.env[.properties]

spring.datasource.url=${SPC_DB_URL}
spring.datasource.username=${SPC_DB_USERNAME}
spring.datasource.password=${SPC_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml

jwt.secret=${SPC_JWT_SECRET}

spring.data.redis.host=${SPC_REDIS_HOST:redis}
spring.data.redis.port=${SPC_REDIS_PORT:6379}

logging.level.com.spc.spc_back=INFO
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.boot.actuate.endpoint.web=WARN

spring.main.allow-bean-definition-overriding=true
